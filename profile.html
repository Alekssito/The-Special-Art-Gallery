<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='central' font-size='50'%3E%F0%9F%8E%A8%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - The Special Art Gallery</title>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg border-bottom sticky-top py-3">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-palette-fill fs-3"></i>
        <span>Special Art Gallery</span>
      </a>
      <button class="navbar-toggler text-white border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="bi bi-list fs-2"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-2 mt-3 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/draw.html"><i class="bi bi-brush"></i> Draw</a>
          </li>
          <li class="nav-item ms-lg-3">
            <a class="nav-link" href="/login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-accent rounded-pill px-4 shadow-sm text-dark mt-2 mt-lg-0 active fw-bold" href="/register.html">Sign Up</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="card card-custom p-4 p-lg-5">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h1 class="h3 fw-bold mb-1" style="color: var(--primary-color);">
            <i class="bi bi-person-circle me-2"></i>My Profile <span id="profileUsername"></span>
          </h1>
          <p class="text-muted mb-0" id="profileSubtitle">Loading your account...</p>
        </div>
        <a href="/draw.html" class="btn btn-primary-custom">
          <i class="bi bi-brush me-1"></i> Draw Something
        </a>
      </div>

      <div id="profileDrawings" class="row g-4">
      </div>
    </div>
  </main>

  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/profile.js"></script>
</body>
</html>
