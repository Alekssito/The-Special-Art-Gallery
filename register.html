<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - The Special Art Gallery</title>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg border-bottom sticky-top py-3">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-palette-fill fs-3"></i>
        <span>Special Art Gallery</span>
      </a>
      <button class="navbar-toggler text-white border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="bi bi-list fs-2"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-2 mt-3 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/draw.html"><i class="bi bi-brush"></i> Draw</a>
          </li>
          <li class="nav-item ms-lg-3">
            <a class="nav-link" href="/login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-accent rounded-pill px-4 shadow-sm text-dark mt-2 mt-lg-0 active fw-bold" href="/register.html">Sign Up</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="d-flex align-items-center justify-content-center flex-grow-1" style="min-height: 80vh;">
    <div class="container auth-wrapper">
      <div class="card card-custom p-5">
        <h2 class="auth-header">
          <i class="bi bi-person-lines-fill d-block mb-3 fs-1 text-secondary"></i>
          Register
        </h2>
        <form id="registerForm">
          <div class="mb-4">
            <label for="username" class="form-label fw-bold text-muted">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
              <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="CreativeArtist99" required>
            </div>
          </div>
          <div class="mb-4">
            <label for="email" class="form-label fw-bold text-muted">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
              <input type="email" class="form-control border-start-0 ps-0" id="email" placeholder="artist@example.com" required>
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-bold text-muted">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="••••••••" required>
            </div>
          </div>
          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-bold text-muted">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-shield-lock text-muted"></i></span>
              <input type="password" class="form-control border-start-0 ps-0" id="confirm_password" placeholder="••••••••" required>
            </div>
          </div>
          
          <button type="submit" class="btn btn-secondary-custom w-100 py-3 shadow">
            Create Profile <i class="bi bi-person-plus ms-1 fs-5"></i>
          </button>
        </form>
        <p class="text-center mt-4 text-muted">
          Already a true artist? <a href="/login.html" class="fw-bold text-decoration-none" style="color: var(--secondary-color);">Sign in instead 💡</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Load Main JavaScript -->
  <script type="module" src="/src/js/main.js"></script>
  <script type="module">
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // Only UI, no functionality needed
      window.showToast('Registration Attempt', 'Auth functionalities not yet implemented. Creating mock profile...', 'success');
      setTimeout(() => {
        window.location.href = '/login.html';
      }, 2500);
    });
  </script>
</body>
</html>
